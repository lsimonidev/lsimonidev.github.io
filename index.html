<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/reset.css">
    <link rel="stylesheet" href="./css/components/header.css">
    <link rel="stylesheet" href="./css/components/button.css">
    <link rel="stylesheet" href="./css/components/title.css">
    <link rel="stylesheet" href="./css/components/subtitle.css">

    <link rel="stylesheet" href="./css/components/banner.css">
    <link rel="stylesheet" href="./css/components/box.css">

    <link rel="stylesheet" href="./css/components/section.css">
    <link rel="stylesheet" href="./css/components/skill.css">
    <link rel="stylesheet" href="./css/components/progressBar.css">

    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;500&family=Press+Start+2P&display=swap" rel="stylesheet">
    <title>Laura Simoni</title>
</head>
<body>
    <header class="header">
        <img src="./assets/img/logo.jpg" alt="logo" class="header__logo">
        <nav class="header__menu">
            <a class="header__menu_link" href="#" lang="en">Skills</a>
            <a class="header__menu_link" href="#"/>Projetos</a>
            <a class="header__menu_link" href="#">Sobre</a>
            <a class="header__menu_link" href="#">Contatos</a>
            <a class="button" href="#" lang="en">Download CV</a>
        </nav>
    </header>

    <section class="banner">
        <div class="banner__wrapper">
            <div class="box">
                <h1 class="title">Laura Simoni</h1>
                <h2 class="subtitle">FrontEnd Developer</h2>
            </div>

            <div class="banner__navigation">
                <a class="button" href="#" lang="en">Download CV</a>
                <a class="button" href="#" lang="en">Contatos CV</a>
            </div>
        </div>
    </section>

    <section class="section">
        <h1 class="title">Skills</h1>
        <article class="skill">
            <img src="./assets/img/ico_html5.png" alt="Logo do HTML5 em PixelArt" class="icon">
            
            <div class="right">
                <h3 class="subtitle">HTML</h3>
                <progress id="file" max="100" value="70" class="progressBar"> 70% </progress>
            </div>
            
        </article>
    </section>

    <section class="section projetos">
        <h1 class="title">Projetos</h1>
    </section>
    <section class="section sobre">
        <h1 class="title">Sobre</h1>
    </section>
    <section class="section contato">
        <h1 class="title">Contato</h1>
    </section>

</body>
</html>
